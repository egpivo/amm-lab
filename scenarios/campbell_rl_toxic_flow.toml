name        = "campbell_rl_toxic_flow"
description = """Arb-heavy toxic flow scenario. Each step has 20% probability of a toxic burst
where fundamental traders pull back to 30% of normal. The same observed oracle gap implies
different optimal fees depending on current flow composition. Flow-aware RL may outperform
oracle_gap by raising fees mainly during toxic bursts."""

amm_fee     = 0.0006
cex_fee     = 0.0010
buy_demand  = 100.0
sell_demand = 100.0
reserve_x   = 1000.0
reserve_y   = 1000.0
sigma       = 0.04
mu          = 0.0
n_steps     = 1440
seed        = 0

flow_regime            = "toxic_burst"
toxic_burst_prob       = 0.20
toxic_burst_arb_scale  = 1.0
toxic_burst_fund_scale = 0.30
regime_switch_period   = 0
