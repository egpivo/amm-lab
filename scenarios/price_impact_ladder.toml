name = "price_impact_ladder"
description = "Same 1T/1T pool, six trade sizes (0.01% → 25%) — price impact grows with trade size. Base unit scale eliminates rounding on small trades."

# ── 0.01% trade ──────────────────────────────────────────────────────────────
[[transactions]]
type = "CreatePool"
reserve_x = 1000000000000
reserve_y = 1000000000000
fee_bps = 30

[[transactions]]
type = "SwapExactIn"
actor = "Trader1"
direction = "XtoY"
amount_in = 100000000   # 0.01% of pool
min_amount_out = 0

# ── 0.1% trade ───────────────────────────────────────────────────────────────
[[transactions]]
type = "CreatePool"
reserve_x = 1000000000000
reserve_y = 1000000000000
fee_bps = 30

[[transactions]]
type = "SwapExactIn"
actor = "Trader1"
direction = "XtoY"
amount_in = 1000000000   # 0.1%
min_amount_out = 0

